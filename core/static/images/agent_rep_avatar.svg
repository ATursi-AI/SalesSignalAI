<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a28;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a1444;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient - warm amber/gold -->
    <linearGradient id="accentRep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1" />
    </linearGradient>
    <!-- Star gradient -->
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb347;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glowR" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Outer glow amber -->
    <filter id="outerGlowR">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shadow -->
    <filter id="shadowR">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- Circular clip -->
    <clipPath id="circClipR">
      <circle cx="200" cy="200" r="180"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGradR)" stroke="url(#accentRep)" stroke-width="3"/>

  <!-- Subtle radial pattern -->
  <g clip-path="url(#circClipR)" opacity="0.06">
    <circle cx="200" cy="200" r="40" fill="none" stroke="#ffb347" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="70" fill="none" stroke="#ffb347" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="100" fill="none" stroke="#ffb347" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="130" fill="none" stroke="#ffb347" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="160" fill="none" stroke="#ffb347" stroke-width="0.5"/>
    <line x1="200" y1="20" x2="200" y2="380" stroke="#ffb347" stroke-width="0.5"/>
    <line x1="20" y1="200" x2="380" y2="200" stroke="#ffb347" stroke-width="0.5"/>
    <line x1="60" y1="60" x2="340" y2="340" stroke="#ffb347" stroke-width="0.5"/>
    <line x1="340" y1="60" x2="60" y2="340" stroke="#ffb347" stroke-width="0.5"/>
  </g>

  <!-- Floating stars background -->
  <g clip-path="url(#circClipR)" opacity="0.15">
    <!-- Star 1 -->
    <polygon points="80,80 83,90 93,90 85,96 88,106 80,100 72,106 75,96 67,90 77,90" fill="#ffd700"/>
    <!-- Star 2 -->
    <polygon points="320,100 323,110 333,110 325,116 328,126 320,120 312,126 315,116 307,110 317,110" fill="#ffd700"/>
    <!-- Star 3 -->
    <polygon points="90,280 93,290 103,290 95,296 98,306 90,300 82,306 85,296 77,290 87,290" fill="#ffd700"/>
    <!-- Star 4 -->
    <polygon points="310,260 313,270 323,270 315,276 318,286 310,280 302,286 305,276 297,270 307,270" fill="#ffd700"/>
    <!-- Star 5 -->
    <polygon points="55,180 57,187 64,187 59,192 61,199 55,195 49,199 51,192 46,187 53,187" fill="#ffd700"/>
    <!-- Star 6 -->
    <polygon points="345,180 347,187 354,187 349,192 351,199 345,195 339,199 341,192 336,187 343,187" fill="#ffd700"/>
  </g>

  <!-- Robot head -->
  <g filter="url(#shadowR)">
    <!-- Head - slightly rounder/friendlier than GEO -->
    <rect x="118" y="92" width="164" height="150" rx="35" ry="35" fill="#1f0f35" stroke="url(#accentRep)" stroke-width="2.5"/>

    <!-- Forehead accent -->
    <line x1="150" y1="108" x2="250" y2="108" stroke="url(#accentRep)" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>

    <!-- Eyes - warm, shield/badge style -->
    <g filter="url(#glowR)">
      <!-- Left eye -->
      <circle cx="163" cy="158" r="22" fill="#120828" stroke="#ffb347" stroke-width="2"/>
      <circle cx="163" cy="158" r="14" fill="none" stroke="#ffb347" stroke-width="1" opacity="0.5"/>
      <circle cx="163" cy="158" r="8" fill="#ffb347" opacity="0.9"/>
      <circle cx="163" cy="158" r="4" fill="#ffffff" opacity="0.8"/>
      <!-- Warm scan lines -->
      <line x1="145" y1="158" x2="152" y2="158" stroke="#ffb347" stroke-width="1.5" opacity="0.6"/>
      <line x1="174" y1="158" x2="181" y2="158" stroke="#ffb347" stroke-width="1.5" opacity="0.6"/>

      <!-- Right eye -->
      <circle cx="237" cy="158" r="22" fill="#120828" stroke="#ffb347" stroke-width="2"/>
      <circle cx="237" cy="158" r="14" fill="none" stroke="#ffb347" stroke-width="1" opacity="0.5"/>
      <circle cx="237" cy="158" r="8" fill="#ffb347" opacity="0.9"/>
      <circle cx="237" cy="158" r="4" fill="#ffffff" opacity="0.8"/>
      <!-- Warm scan lines -->
      <line x1="219" y1="158" x2="226" y2="158" stroke="#ffb347" stroke-width="1.5" opacity="0.6"/>
      <line x1="248" y1="158" x2="255" y2="158" stroke="#ffb347" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- Mouth - friendly smile curve -->
    <path d="M160,202 Q175,220 200,222 Q225,220 240,202" fill="none" stroke="#ffb347" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Small teeth/bars for data feel -->
    <line x1="178" y1="210" x2="178" y2="215" stroke="#ffb347" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="190" y1="213" x2="190" y2="219" stroke="#ffb347" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="200" y1="214" x2="200" y2="221" stroke="#ffb347" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="210" y1="213" x2="210" y2="219" stroke="#ffb347" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="222" y1="210" x2="222" y2="215" stroke="#ffb347" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

    <!-- Antenna - crown/star style -->
    <line x1="200" y1="92" x2="200" y2="62" stroke="url(#accentRep)" stroke-width="3" stroke-linecap="round"/>
    <!-- Star on top -->
    <g transform="translate(200, 50)" filter="url(#glowR)">
      <polygon points="0,-14 4,-5 13,-5 6,1 8,10 0,5 -8,10 -6,1 -13,-5 -4,-5" fill="url(#starGrad)" stroke="#ffd700" stroke-width="0.5"/>
    </g>

    <!-- Side accents - ear pieces -->
    <rect x="106" y="138" width="12" height="4" rx="2" fill="#ffb347" opacity="0.5"/>
    <rect x="106" y="148" width="8" height="4" rx="2" fill="#ffb347" opacity="0.3"/>
    <rect x="282" y="138" width="12" height="4" rx="2" fill="#ffb347" opacity="0.5"/>
    <rect x="286" y="148" width="8" height="4" rx="2" fill="#ffb347" opacity="0.3"/>
  </g>

  <!-- Neck -->
  <rect x="180" y="242" width="40" height="20" rx="4" fill="#1f0f35" stroke="#ffb347" stroke-width="1.5"/>
  <line x1="190" y1="247" x2="190" y2="257" stroke="#ffb347" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="247" x2="200" y2="257" stroke="#ffb347" stroke-width="1" opacity="0.4"/>
  <line x1="210" y1="247" x2="210" y2="257" stroke="#ffb347" stroke-width="1" opacity="0.4"/>

  <!-- Body / Shoulders -->
  <g filter="url(#shadowR)">
    <path d="M110,302 Q110,267 145,262 L180,262 L220,262 L255,262 Q290,267 290,302 L290,342 Q290,357 275,357 L125,357 Q110,357 110,342 Z" fill="#1f0f35" stroke="url(#accentRep)" stroke-width="2.5"/>

    <!-- Chest shield/badge icon -->
    <g transform="translate(200, 300)" filter="url(#glowR)">
      <!-- Shield shape -->
      <path d="M0,-26 L20,-18 L20,4 Q20,20 0,28 Q-20,20 -20,4 L-20,-18 Z" fill="none" stroke="#ffb347" stroke-width="2"/>
      <!-- Star inside shield -->
      <polygon points="0,-12 3,-5 10,-5 5,0 7,8 0,4 -7,8 -5,0 -10,-5 -3,-5" fill="#ffb347" opacity="0.8"/>
    </g>

    <!-- Shoulder accents -->
    <line x1="125" y1="277" x2="165" y2="277" stroke="#ffb347" stroke-width="1" opacity="0.3"/>
    <line x1="235" y1="277" x2="275" y2="277" stroke="#ffb347" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- REP text label -->
  <text x="200" y="392" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="700" letter-spacing="8" fill="url(#accentRep)">REP</text>
</svg>