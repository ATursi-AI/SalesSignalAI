<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2744;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient - electric teal/cyan -->
    <linearGradient id="accentGeo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a3ff;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Outer glow -->
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- Circular clip -->
    <clipPath id="circClip">
      <circle cx="200" cy="200" r="180"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" stroke="url(#accentGeo)" stroke-width="3"/>

  <!-- Subtle grid pattern -->
  <g clip-path="url(#circClip)" opacity="0.08">
    <line x1="60" y1="0" x2="60" y2="400" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="400" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="400" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="400" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="400" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="400" y2="60" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="400" y2="120" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="400" y2="180" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="400" y2="240" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="400" y2="360" stroke="#00d4aa" stroke-width="0.5"/>
  </g>

  <!-- Orbital rings -->
  <g clip-path="url(#circClip)">
    <ellipse cx="200" cy="200" rx="140" ry="50" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.15" transform="rotate(-25, 200, 200)"/>
    <ellipse cx="200" cy="200" rx="120" ry="45" fill="none" stroke="#00a3ff" stroke-width="0.8" opacity="0.12" transform="rotate(15, 200, 200)"/>
    <ellipse cx="200" cy="200" rx="160" ry="55" fill="none" stroke="#00d4aa" stroke-width="0.6" opacity="0.08" transform="rotate(-50, 200, 200)"/>
  </g>

  <!-- Robot head - main shape -->
  <g filter="url(#shadow)">
    <!-- Head -->
    <rect x="120" y="95" width="160" height="145" rx="30" ry="30" fill="#0f2038" stroke="url(#accentGeo)" stroke-width="2.5"/>

    <!-- Forehead accent line -->
    <line x1="150" y1="110" x2="250" y2="110" stroke="url(#accentGeo)" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>

    <!-- Eyes - scanning/radar style -->
    <g filter="url(#glow)">
      <!-- Left eye -->
      <circle cx="163" cy="160" r="22" fill="#0a1628" stroke="#00d4aa" stroke-width="2"/>
      <circle cx="163" cy="160" r="14" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.5"/>
      <circle cx="163" cy="160" r="8" fill="#00d4aa" opacity="0.9"/>
      <circle cx="163" cy="160" r="4" fill="#ffffff" opacity="0.8"/>
      <!-- Scanning line left -->
      <line x1="145" y1="160" x2="152" y2="160" stroke="#00d4aa" stroke-width="1.5" opacity="0.6"/>
      <line x1="174" y1="160" x2="181" y2="160" stroke="#00d4aa" stroke-width="1.5" opacity="0.6"/>

      <!-- Right eye -->
      <circle cx="237" cy="160" r="22" fill="#0a1628" stroke="#00d4aa" stroke-width="2"/>
      <circle cx="237" cy="160" r="14" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.5"/>
      <circle cx="237" cy="160" r="8" fill="#00d4aa" opacity="0.9"/>
      <circle cx="237" cy="160" r="4" fill="#ffffff" opacity="0.8"/>
      <!-- Scanning line right -->
      <line x1="219" y1="160" x2="226" y2="160" stroke="#00d4aa" stroke-width="1.5" opacity="0.6"/>
      <line x1="248" y1="160" x2="255" y2="160" stroke="#00d4aa" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- Mouth - data readout style -->
    <rect x="155" y="200" width="90" height="18" rx="4" fill="#0a1628" stroke="#00d4aa" stroke-width="1.5"/>
    <rect x="160" y="204" width="8" height="10" rx="1" fill="#00d4aa" opacity="0.9"/>
    <rect x="172" y="207" width="8" height="7" rx="1" fill="#00d4aa" opacity="0.7"/>
    <rect x="184" y="202" width="8" height="12" rx="1" fill="#00d4aa" opacity="0.9"/>
    <rect x="196" y="205" width="8" height="9" rx="1" fill="#00d4aa" opacity="0.6"/>
    <rect x="208" y="203" width="8" height="11" rx="1" fill="#00d4aa" opacity="0.8"/>
    <rect x="220" y="206" width="8" height="8" rx="1" fill="#00d4aa" opacity="0.7"/>
    <rect x="232" y="204" width="8" height="10" rx="1" fill="#00d4aa" opacity="0.9"/>

    <!-- Antenna -->
    <line x1="200" y1="95" x2="200" y2="65" stroke="url(#accentGeo)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="200" cy="58" r="8" fill="#0f2038" stroke="#00d4aa" stroke-width="2"/>
    <circle cx="200" cy="58" r="4" fill="#00d4aa" filter="url(#glow)"/>

    <!-- Side details - location pin antenna left -->
    <rect x="108" y="140" width="12" height="4" rx="2" fill="#00d4aa" opacity="0.5"/>
    <rect x="108" y="150" width="8" height="4" rx="2" fill="#00d4aa" opacity="0.3"/>

    <!-- Side details right -->
    <rect x="280" y="140" width="12" height="4" rx="2" fill="#00d4aa" opacity="0.5"/>
    <rect x="284" y="150" width="8" height="4" rx="2" fill="#00d4aa" opacity="0.3"/>
  </g>

  <!-- Neck -->
  <rect x="180" y="240" width="40" height="20" rx="4" fill="#0f2038" stroke="#00d4aa" stroke-width="1.5"/>
  <line x1="190" y1="245" x2="190" y2="255" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="245" x2="200" y2="255" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>
  <line x1="210" y1="245" x2="210" y2="255" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>

  <!-- Body / Shoulders -->
  <g filter="url(#shadow)">
    <path d="M110,300 Q110,265 145,260 L180,260 L220,260 L255,260 Q290,265 290,300 L290,340 Q290,355 275,355 L125,355 Q110,355 110,340 Z" fill="#0f2038" stroke="url(#accentGeo)" stroke-width="2.5"/>

    <!-- Chest location pin icon -->
    <g transform="translate(200, 300)" filter="url(#glow)">
      <path d="M0,-25 C-14,-25 -20,-14 -20,-5 C-20,10 0,25 0,25 C0,25 20,10 20,-5 C20,-14 14,-25 0,-25 Z" fill="none" stroke="#00d4aa" stroke-width="2"/>
      <circle cx="0" cy="-5" r="7" fill="#00d4aa" opacity="0.8"/>
      <circle cx="0" cy="-5" r="3" fill="#ffffff" opacity="0.7"/>
    </g>

    <!-- Shoulder accents -->
    <line x1="125" y1="275" x2="165" y2="275" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
    <line x1="235" y1="275" x2="275" y2="275" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- GEO text label -->
  <text x="200" y="390" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="700" letter-spacing="8" fill="url(#accentGeo)">GEO</text>
</svg>