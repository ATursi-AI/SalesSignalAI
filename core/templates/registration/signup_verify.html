{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email — SalesSignal AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #FAFBFC; color: #1A1A2E; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .verify-card { max-width: 480px; width: 100%; background: #fff; border-radius: 16px; border: 1px solid #E2E8F0; padding: 48px 40px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
        .verify-icon { width: 72px; height: 72px; background: #CCFBF1; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; color: #0D9488; margin-bottom: 20px; }
        .verify-card h1 { font-family: 'Exo 2', sans-serif; font-weight: 800; font-size: 1.5rem; margin-bottom: 12px; }
        .verify-card p { color: #64748B; font-size: 0.95rem; line-height: 1.7; margin-bottom: 24px; }
        .verify-email { font-weight: 700; color: #1A1A2E; }
        .verify-card a { color: #0D9488; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="verify-card">
        <div class="verify-icon"><i class="bi bi-envelope-check-fill"></i></div>
        <h1>Check Your Email</h1>
        <p>We sent a verification link to<br><span class="verify-email">{{ email }}</span></p>
        <p>Click the link in the email to activate your account and get started.</p>
        <a href="{% url 'login' %}">Already verified? Log in</a>
    </div>
</body>
</html>
