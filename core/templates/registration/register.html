{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | SalesSignal AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/salessignal.css' %}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass-card-static animate-fade-in-up">
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <div style="display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
                    <div class="brand-icon" style="width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent-blue), #8B5CF6); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;">
                        <i class="bi bi-broadcast" style="font-size: 1.1rem;"></i>
                    </div>
                    <span style="font-weight: 800; font-size: 1.1rem; background: linear-gradient(135deg, var(--accent-blue), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">SalesSignal AI</span>
                </div>
            </div>
            <h2>Create Your Account</h2>
            <p class="auth-subtitle">Start capturing leads in minutes</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert-dark alert-error">
                        <i class="bi bi-exclamation-circle"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" class="auth-form">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label-dark">Business Name</label>
                    <input type="text" name="business_name" class="form-control-dark" placeholder="e.g. Premier Plumbing LLC" required>
                </div>
                <div class="form-group">
                    <label class="form-label-dark">Email</label>
                    <input type="email" name="email" class="form-control-dark" placeholder="you@yourbusiness.com" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label-dark">Password</label>
                        <input type="password" name="password" class="form-control-dark" placeholder="Min 8 characters" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label-dark">Confirm</label>
                        <input type="password" name="password2" class="form-control-dark" placeholder="Re-enter password" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary-glow w-100 mt-2" style="padding: 0.85rem; justify-content: center;">
                    <i class="bi bi-rocket-takeoff-fill"></i> Create Account
                </button>
            </form>
            <div class="auth-divider">Already have an account?</div>
            <a href="{% url 'login' %}" class="btn-secondary w-100" style="justify-content: center;">Log In</a>
        </div>
    </div>
</body>
</html>
