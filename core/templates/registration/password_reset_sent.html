{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email — SalesSignal AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #FAFBFC; color: #1A1A2E; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .login-card {
            max-width: 420px; width: 100%; background: #fff; border-radius: 16px;
            border: 1px solid #E2E8F0; padding: 48px 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            text-align: center;
        }
        .icon-circle {
            width: 72px; height: 72px; background: rgba(13,148,136,0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;
        }
        .icon-circle i { font-size: 2rem; color: #0D9488; }

        .login-title { font-family: 'Exo 2', sans-serif; font-weight: 800; font-size: 1.5rem; margin-bottom: 8px; }
        .login-sub { color: #64748B; font-size: 0.9rem; margin-bottom: 28px; line-height: 1.5; }

        .login-links { margin-top: 20px; font-size: 0.85rem; color: #64748B; }
        .login-links a { color: #0D9488; text-decoration: none; font-weight: 600; }

        .login-footer { text-align: center; margin-top: 28px; font-size: 0.78rem; color: #94A3B8; }
        .login-footer a { color: #0D9488; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon-circle">
            <i class="bi bi-envelope-check-fill"></i>
        </div>

        <div class="login-title">Check Your Email</div>
        <div class="login-sub">We sent password reset instructions to {{ email }}</div>

        <div class="login-links">
            <a href="{% url 'login' %}">Back to Login</a>
        </div>

        <div class="login-footer">
            <a href="/">SalesSignal AI</a> &middot; <a href="mailto:support@salessignalai.com">support@salessignalai.com</a>
        </div>
    </div>
</body>
</html>
