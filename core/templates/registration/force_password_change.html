{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Your Password — SalesSignal AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #FAFBFC; color: #1A1A2E; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .login-card {
            max-width: 420px; width: 100%; background: #fff; border-radius: 16px;
            border: 1px solid #E2E8F0; padding: 48px 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .login-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; text-decoration: none; color: #1A1A2E; }
        .login-logo-icon { width: 40px; height: 40px; background: #0D9488; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.2rem; }
        .login-logo-text { font-family: 'Exo 2', sans-serif; font-weight: 800; font-size: 1.2rem; }

        .login-title { text-align: center; font-family: 'Exo 2', sans-serif; font-weight: 800; font-size: 1.5rem; margin-bottom: 4px; }
        .login-sub { text-align: center; color: #64748B; font-size: 0.9rem; margin-bottom: 28px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1px solid #E2E8F0; border-radius: 10px; font-size: 0.95rem; font-family: inherit; color: #1A1A2E; background: #fff; }
        .form-group input:focus { outline: none; border-color: #0D9488; }

        .login-btn {
            width: 100%; padding: 14px; background: #0D9488; color: #fff;
            font-family: 'Exo 2', sans-serif; font-weight: 700; font-size: 1.05rem;
            border: none; border-radius: 12px; cursor: pointer;
            transition: transform 0.15s; box-shadow: 0 4px 16px rgba(13,148,136,0.3); margin-top: 4px;
        }
        .login-btn:hover { transform: translateY(-2px); }

        .login-error { background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626; border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; margin-bottom: 16px; text-align: center; }

        .login-footer { text-align: center; margin-top: 28px; font-size: 0.78rem; color: #94A3B8; }
        .login-footer a { color: #0D9488; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <a href="/" class="login-logo">
            <div class="login-logo-icon"><i class="bi bi-broadcast"></i></div>
            <span class="login-logo-text">SalesSignal AI</span>
        </a>

        <div class="login-title">Change Your Password</div>
        <div class="login-sub">Please set a new password to continue.</div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" required minlength="8" placeholder="Min. 8 characters">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required minlength="8" placeholder="Re-enter password">
            </div>
            <button type="submit" class="login-btn">Set Password & Continue</button>
        </form>

        <div class="login-footer">
            <a href="/">SalesSignal AI</a> &middot; <a href="mailto:support@salessignalai.com">support@salessignalai.com</a>
        </div>
    </div>
</body>
</html>
